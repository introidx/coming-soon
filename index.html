<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Octagn | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#FF982D;
    --secondary:#F84D23;
    --bg:#090909;
    --text:#ffffff;
    --muted:#9b9b9b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow:hidden;
}

.background{
    position:fixed;
    inset:0;
    z-index:-1;
}

.glow{
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.25;
}

.glow.one{
    background:var(--primary);
    top:-200px;
    left:-150px;
}

.glow.two{
    background:var(--secondary);
    bottom:-250px;
    right:-150px;
}

.grid{
    position:absolute;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:40px 40px;
}

.container{
    max-width:1200px;
    margin:auto;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:2rem;
}

.content{
    text-align:center;
    max-width:800px;
}

.logo{
    width:100px;
    height:100px;
    margin:0 auto 2rem;
    position:relative;
}

.logo svg{
    width:100%;
    height:100%;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 18px;
    border:1px solid rgba(255,255,255,.1);
    border-radius:999px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    margin-bottom:2rem;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--primary);
    animation:pulse 2s infinite;
}

h1{
    font-size:clamp(3rem,8vw,6rem);
    font-weight:800;
    line-height:1;
    margin-bottom:1.5rem;
}

.gradient{
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--secondary)
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    color:var(--muted);
    font-size:1.2rem;
    line-height:1.8;
    margin-bottom:3rem;
}

.waitlist{
    display:flex;
    max-width:550px;
    margin:auto;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
}

input{
    flex:1;
    min-width:280px;
    padding:18px;
    border-radius:16px;
    border:none;
    outline:none;
    background:#151515;
    color:white;
    font-size:1rem;
}

button{
    padding:18px 28px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-weight:700;
    color:white;
    background:linear-gradient(
        135deg,
        var(--primary),
        var(--secondary)
    );
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

.footer{
    margin-top:4rem;
    color:#666;
    font-size:.9rem;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
        opacity:1;
    }
    50%{
        transform:scale(1.4);
        opacity:.5;
    }
}

@media(max-width:768px){

    .waitlist{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    input{
        width:100%;
    }
}

</style>
</head>
<body>

<div class="background">
    <div class="glow one"></div>
    <div class="glow two"></div>
    <div class="grid"></div>
</div>

<div class="container">

    <div class="content">

        <div class="logo">
            <svg viewBox="0 0 100 100">
                <polygon
                    points="30,5 70,5 95,30 95,70 70,95 30,95 5,70 5,30"
                    fill="none"
                    stroke="url(#grad)"
                    stroke-width="6"/>

                <defs>
                    <linearGradient id="grad">
                        <stop offset="0%" stop-color="#FF982D"/>
                        <stop offset="100%" stop-color="#F84D23"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <div class="badge">
            <span class="dot"></span>
            Launching Soon
        </div>

        <h1>
            Fitness Challenges,<br>
            Reimagined by <span class="gradient">Octagn</span>
        </h1>
        
        <form class="waitlist">
            <input
                type="email"
                placeholder="Enter your email address"
            />
            <button>
                Join Waitlist
            </button>
        </form>

        <div class="footer">
            © 2026 Octagn. All rights reserved.
        </div>

    </div>

</div>

</body>
</html>
